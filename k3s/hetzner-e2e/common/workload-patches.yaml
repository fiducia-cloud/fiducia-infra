# Adapt the hardened production base to one schedulable k3s server per cluster.
# Image tags remain placeholders here; the release renderer refuses to deploy
# until all four core images are supplied as immutable sha256 references.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fiducia-node
  namespace: fiducia
spec:
  template:
    spec:
      # All four core images live in the private ghcr.io/fiducia-cloud org;
      # scripts/hetzner-e2e-secrets.sh provisions this pull Secret in every
      # cluster. Without the reference here every pod ImagePullBackOffs.
      imagePullSecrets:
        - name: fiducia-ghcr-pull
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: node
          env:
            - name: FIDUCIA_DEPLOYMENT_ENV
              value: e2e
        - name: sidecar
          env:
            - name: FIDUCIA_DEPLOYMENT_ENV
              value: e2e
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fiducia-brain
  namespace: fiducia
spec:
  template:
    spec:
      # All four core images live in the private ghcr.io/fiducia-cloud org;
      # scripts/hetzner-e2e-secrets.sh provisions this pull Secret in every
      # cluster. Without the reference here every pod ImagePullBackOffs.
      imagePullSecrets:
        - name: fiducia-ghcr-pull
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: brain
          env:
            - name: FIDUCIA_DEPLOYMENT_ENV
              value: e2e
        - name: sidecar
          env:
            - name: FIDUCIA_DEPLOYMENT_ENV
              value: e2e
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiducia-load-balance
  namespace: fiducia
spec:
  template:
    spec:
      imagePullSecrets:
        - name: fiducia-ghcr-pull
      containers:
        - name: lb
          env:
            - name: FIDUCIA_TLS_CERT_PATH
              $patch: delete
            - name: FIDUCIA_TLS_KEY_PATH
              $patch: delete
            - name: FIDUCIA_DEPLOYMENT_ENV
              value: e2e
          # NOTE: volumeMounts strategic-merges on `mountPath`, NOT on `name`.
          # Keying this delete on `name` matches nothing and kustomize renders
          # `volumeMounts: []` — silently dropping the writable /tmp mount the
          # read-only rootfs needs.
          volumeMounts:
            - mountPath: /etc/fiducia/tls
              $patch: delete
      volumes:
        - name: tls
          $patch: delete
