# NON-PRODUCTION ONLY. Production is deployed from the reviewed, exact submodule
# pins in fiducia-monorepo's manual deploy workflow. Pointing production ArgoCD at
# fiducia-infra/main would bypass that promotion boundary.
#
# One non-production ArgoCD hub registers test clusters and applies each cluster's
# overlay. A cluster is selected only after it is explicitly labeled both as a
# Fiducia cluster and as nonproduction; an unlabeled or production cluster fails
# closed and is not generated.
#
# Prereqs: `argocd cluster add` each cluster and label its cluster secret with
# `fiducia.cloud/cluster=true` and
# `fiducia.cloud/environment=nonproduction`. The cluster generator supplies
# `name` + `server`.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: fiducia-nonproduction
  namespace: argocd
spec:
  sourceRepos:
    - https://github.com/fiducia-cloud/fiducia-infra.git
  destinations:
    - namespace: fiducia
      server: "*"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fiducia-nonproduction
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            fiducia.cloud/cluster: "true"
            fiducia.cloud/environment: nonproduction
  template:
    metadata:
      name: "fiducia-nonprod-{{name}}"
    spec:
      project: fiducia-nonproduction
      source:
        repoURL: https://github.com/fiducia-cloud/fiducia-infra.git
        targetRevision: main
        path: "clusters/{{name}}"
      destination:
        server: "{{server}}"
        namespace: fiducia
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
