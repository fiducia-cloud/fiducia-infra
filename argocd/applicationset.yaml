# One ArgoCD (a "hub") registers all three clusters and applies each cluster's
# overlay to it. This ApplicationSet fans out: clusters/<name> -> that cluster.
#
# Prereqs: `argocd cluster add` each of the 3 clusters, then fill in their API
# server URLs below.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fiducia
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: gcp
            server: https://GCP_API_SERVER       # TODO
          - cluster: aws
            server: https://AWS_API_SERVER       # TODO
          - cluster: hetzner
            server: https://HETZNER_API_SERVER   # TODO
  template:
    metadata:
      name: "fiducia-{{cluster}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/fiducia-cloud/fiducia-infra.git
        targetRevision: main
        path: "clusters/{{cluster}}"
      destination:
        server: "{{server}}"
        namespace: fiducia
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
