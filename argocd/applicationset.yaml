# NON-PRODUCTION ONLY. Production Argo CD reads rendered, digest-pinned desired
# state from fiducia-monorepo. Pointing production directly at fiducia-infra/main
# would bypass that promotion boundary.
#
# One non-production ArgoCD hub registers test clusters and applies each cluster's
# overlay. A cluster is selected only after it is explicitly labeled both as a
# Fiducia cluster and as nonproduction; an unlabeled or production cluster fails
# closed and is not generated.
#
# Prereqs: `argocd cluster add` each cluster and label its cluster secret with
# `fiducia.cloud/cluster=true` and
# `fiducia.cloud/environment=nonproduction`. The cluster generator supplies
# `name` + `server`.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: fiducia-nonproduction
  namespace: argocd
spec:
  sourceRepos:
    - https://github.com/fiducia-cloud/fiducia-infra.git
  destinations:
    - namespace: fiducia
      server: "*"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    # The rendered base includes the otel-agent's cluster-scoped RBAC (needed by the
    # k8sattributes processor). Without these two, ArgoCD refuses them and the
    # Application sits OutOfSync/Degraded with otel enrichment broken.
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  # Namespaced kinds are pinned to exactly what the overlays render. Notably NO
  # Secret: fiducia-secrets, the LB TLS material, and the observability gateway
  # token are provisioned out-of-band and must never be git-synced through
  # ArgoCD. A new kind in base/ must be added here or its Application degrades.
  namespaceResourceWhitelist:
    - { group: "", kind: ConfigMap }
    - { group: "", kind: Service }
    - { group: "", kind: ServiceAccount }
    - { group: apps, kind: Deployment }
    - { group: apps, kind: StatefulSet }
    - { group: apps, kind: DaemonSet }
    - { group: rbac.authorization.k8s.io, kind: Role }
    - { group: rbac.authorization.k8s.io, kind: RoleBinding }
    - { group: networking.k8s.io, kind: NetworkPolicy }
    - { group: policy, kind: PodDisruptionBudget }
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fiducia-nonproduction
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            fiducia.cloud/cluster: "true"
            fiducia.cloud/environment: nonproduction
  template:
    metadata:
      name: "fiducia-nonprod-{{name}}"
    spec:
      project: fiducia-nonproduction
      source:
        repoURL: https://github.com/fiducia-cloud/fiducia-infra.git
        targetRevision: main
        path: "clusters/{{name}}"
      destination:
        server: "{{server}}"
        namespace: fiducia
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
