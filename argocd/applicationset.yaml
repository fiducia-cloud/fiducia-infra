# One ArgoCD (a "hub") registers all three clusters and applies each cluster's
# overlay to it. This ApplicationSet fans out: clusters/<name> -> that cluster.
#
# Prereqs: `argocd cluster add` each cluster and label its cluster secret with
# `fiducia.cloud/cluster=true`. The cluster generator supplies `name` + `server`.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fiducia
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            fiducia.cloud/cluster: "true"
  template:
    metadata:
      name: "fiducia-{{name}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/fiducia-cloud/fiducia-infra.git
        targetRevision: main
        path: "clusters/{{name}}"
      destination:
        server: "{{server}}"
        namespace: fiducia
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
