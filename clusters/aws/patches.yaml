# AWS-specific: EBS storage class + node count.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fiducia-node
  namespace: fiducia
spec:
  replicas: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: gp3   # EBS CSI (adjust to your cluster's class name)
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fiducia-brain
  namespace: fiducia
spec:
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: gp3
