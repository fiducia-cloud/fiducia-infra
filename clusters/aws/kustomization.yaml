apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fiducia
resources:
  - ../../base
configMapGenerator:
  - name: fiducia-cluster
    literals:
      - FIDUCIA_CLUSTER=aws          # this cluster's failure-domain name
      - FIDUCIA_CLUSTER_ID=fiducia-prod
      - FIDUCIA_SHARD_COUNT=256
      - FIDUCIA_TARGET_NODES=9
      # Cross-cluster Raft peers (the OTHER two clusters). TODO: real endpoints.
      - FIDUCIA_PEERS=node.gcp.fiducia.cloud:9090,node.hetzner.fiducia.cloud:9090
      - FIDUCIA_BRAIN_PEERS=brain.gcp.fiducia.cloud:9095,brain.hetzner.fiducia.cloud:9095
generatorOptions:
  disableNameSuffixHash: true
patches:
  - path: patches.yaml
