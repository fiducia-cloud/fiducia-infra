# Hetzner-specific (the 3rd platform): hcloud volumes + node count.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fiducia-node
  namespace: fiducia
spec:
  replicas: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: hcloud-volumes
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fiducia-brain
  namespace: fiducia
spec:
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: hcloud-volumes
