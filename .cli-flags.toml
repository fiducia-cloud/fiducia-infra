# Declares this repo's CLI flags and their env-var mappings. Consumed by the
# flags-2-env tool (scripts/with-flags2env.sh) and audited by the cli-flags CI job.
[help]
url = "https://github.com/fiducia-cloud/fiducia-infra"
columns = ["options", "env", "type", "description"]

[parse]
allow_unknown = false

[flags.check]
env = "FIDUCIA_RENDER_CHECK"
aliases = ["check"]
type = "bool"
help = "Verify generated infrastructure files without writing them."

