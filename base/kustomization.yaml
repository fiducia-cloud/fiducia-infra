# Base manifests shared by every cluster. NOT applied directly — each overlay
# under clusters/ adds the cluster-specific ConfigMap (fiducia-cluster), storage
# class, and replica counts.
#
# The BRAIN is deliberately NOT here. It runs only on clusters that are members of
# the (odd-sized) brain Raft group, which include the `components/brain` Component
# from their own overlay. Node-only clusters (topology.toml `brain = false`) omit
# it. See components/brain/ and tools/render.mjs.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fiducia
resources:
  - namespace.yaml
  - networkpolicy.yaml                  # namespace default-deny + DNS/east-west/probe allows
  - observability/otel-agent.yaml
  - observability/networkpolicy.yaml    # otel-agent egress (gateway + k8s API)
  - node/statefulset.yaml
  - node/service.yaml
  - node/networkpolicy.yaml
  - node/pdb.yaml
  - load-balance/deployment.yaml
  - load-balance/service.yaml
  - load-balance/pdb.yaml                # keep >=1 LB replica through drains
  - load-balance/networkpolicy.yaml     # LB edge (:8443) ingress
