# fiducia-load-balance: stateless regional router (key -> shard -> leader). Plain
# Deployment — no consensus state, just a cache — so it scales freely. Each
# cluster runs its own; the Cloudflare edge (fiducia-edge) routes clients to a
# healthy cluster's LB.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiducia-load-balance
  namespace: fiducia
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fiducia-load-balance
  template:
    metadata:
      labels:
        app: fiducia-load-balance
    spec:
      # Hardened baseline: run unprivileged, drop all Linux capabilities, and
      # forbid privilege escalation. The binary listens on a high port (8088) so
      # it needs no capabilities. rootfs is read-only with a writable /tmp.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: lb
          image: ghcr.io/fiducia-cloud/fiducia-load-balance:v0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - { containerPort: 8088, name: http }
            - { containerPort: 8443, name: https }
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: PORT
              value: "8088"
            - name: TLS_PORT
              value: "8443"
            - name: FIDUCIA_TLS_CERT_PATH
              value: "/etc/fiducia/tls/tls.crt"
            - name: FIDUCIA_TLS_KEY_PATH
              value: "/etc/fiducia/tls/tls.key"
            - name: FIDUCIA_NODES
              value: "http://fiducia-node-client.fiducia.svc.cluster.local:8090"
            - name: FIDUCIA_BRAIN_URL
              value: "http://fiducia-brain.fiducia.svc.cluster.local:8095"
            # Trusted-hop secret the LB attaches to every node request so the node
            # trusts the identity headers it injects. MUST match the value the node
            # StatefulSet reads from the same Secret. This reference is required:
            # production must fail to schedule rather than silently disable auth.
            - name: FIDUCIA_INTERNAL_SECRET
              valueFrom:
                secretKeyRef: { name: fiducia-secrets, key: internal-secret, optional: false }
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://fiducia-otel-agent.fiducia.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAMESPACE
              value: "fiducia-cloud"
            - name: FIDUCIA_DEPLOYMENT_ENV
              value: "prod"
            - name: FIDUCIA_LOG_FORMAT
              value: "json"
          envFrom:
            - configMapRef: { name: fiducia-cluster }   # FIDUCIA_SHARD_COUNT
          # Readiness uses /readyz (route table hydrated / dependencies OK) so a
          # live-but-not-yet-ready LB is withheld from Service endpoints;
          # liveness stays on the always-open /healthz.
          readinessProbe: { httpGet: { path: /readyz, port: 8088 }, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8088 }, periodSeconds: 15 }
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: tls, mountPath: /etc/fiducia/tls, readOnly: true }
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tls
          secret:
            secretName: fiducia-load-balance-tls
