# Public per-cluster entrypoint. The Cloudflare edge (fiducia-edge) lists one of
# these LoadBalancer addresses per cluster in FIDUCIA_REGIONS and steers clients
# to a healthy one.
apiVersion: v1
kind: Service
metadata:
  name: fiducia-load-balance
  namespace: fiducia
spec:
  type: LoadBalancer
  selector:
    app: fiducia-load-balance
  ports:
    - { name: https, port: 443, targetPort: 8443 }
---
# Private cleartext listener for in-cluster callers and health tooling. Keeping it
# on a separate ClusterIP prevents cloud providers from publishing port 80.
apiVersion: v1
kind: Service
metadata:
  name: fiducia-load-balance-internal
  namespace: fiducia
spec:
  type: ClusterIP
  selector:
    app: fiducia-load-balance
  ports:
    - { name: http, port: 8088, targetPort: 8088 }
