# fiducia-brain: the control plane. Runs ONE member per cluster; the three
# members (one each in hetzner/vultr/civo) form a single Raft group, so the control
# plane itself survives losing any one cluster (2/3 quorum). StatefulSet for
# stable identity + durable placement-map storage.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fiducia-brain
  namespace: fiducia
spec:
  serviceName: fiducia-brain
  replicas: 1                         # one brain member per cluster
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app: fiducia-brain
  template:
    metadata:
      labels:
        app: fiducia-brain
    spec:
      # NOTE: unlike node/sidecar/load-balance, the brain DOES use the Kubernetes
      # API — KubeOracle (src/oracle.rs) reads the in-cluster SA token to poll pod
      # status for confirmed-gone liveness. So the SA token stays mounted here, on
      # a DEDICATED ServiceAccount whose RBAC is exactly the oracle's one call
      # (list app=fiducia-node pods in this namespace — rbac.yaml), not the
      # namespace default SA. automount `true` is the k8s default but is pinned
      # so a blanket automount=false sweep cannot silently disable the oracle:
      # KubeOracle::spawn() fails soft to timeouts-only failure detection, which
      # forfeits the WAN-blip-vs-dead-node distinction it exists to provide.
      serviceAccountName: fiducia-brain
      automountServiceAccountToken: true
      # Hardened baseline: unprivileged, no added capabilities, no privilege
      # escalation. Listens on a high port (8095). rootfs read-only + writable /tmp;
      # durable state lives only on the mounted PVC (fsGroup makes it writable).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: brain
          image: ghcr.io/fiducia-cloud/fiducia-brain:v0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - { containerPort: 8095, name: http }
            - { containerPort: 9095, name: peer }   # cross-cluster brain Raft
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            # Globally-unique brain member id: <pod>.<cluster>. Without this the
            # brain defaults its id to "http://localhost:8095" — the SAME value on
            # all three members, which breaks the peers-exclude-self filter and
            # member identity in the cross-cluster brain Raft group.
            # FIDUCIA_CLUSTER must be an explicit env entry (not only envFrom):
            # $(VAR) interpolation cannot see envFrom values.
            - name: FIDUCIA_CLUSTER
              valueFrom: { configMapKeyRef: { name: fiducia-cluster, key: FIDUCIA_CLUSTER } }
            - name: FIDUCIA_BRAIN_ID
              value: "$(POD_NAME).$(FIDUCIA_CLUSTER)"
            - name: PORT
              value: "8095"                # control plane: /healthz, /readyz, /v1/*
            # Peer plane: cross-cluster brain-Raft RPC (/raft/*). Brain members
            # address each other at this port (FIDUCIA_BRAIN_PEERS = host:9095) and
            # the NetworkPolicy leaves it reachable cross-cluster while locking
            # :8095 to in-namespace. Matches the `peer` containerPort + Service port.
            - name: FIDUCIA_BRAIN_PEER_PORT
              value: "9095"
            # Durable Raft state (term/vote/log/snapshots) MUST live on the PVC
            # mounted at /var/lib/fiducia-brain below. Without this the brain
            # defaults FIDUCIA_DATA_DIR to /tmp/fiducia-brain (the emptyDir), so a
            # pod restart DROPS this member's replicated placement/scale log and it
            # rejoins empty — exactly the durability the StatefulSet + PVC exist to
            # provide. Mirrors the node's FIDUCIA_DATA_DIR wiring.
            - name: FIDUCIA_DATA_DIR
              value: "/var/lib/fiducia-brain"
            # Shared secret peer brains present (bearer) on /raft/*; the brain
            # enables Raft auth only when this is set. The Secret is required
            # (same Secret as the node/LB
            # trusted-hop secret; a distinct key keeps the brain-Raft secret
            # separable from the data-plane one).
            - name: FIDUCIA_BRAIN_RAFT_SECRET
              valueFrom:
                secretKeyRef: { name: fiducia-secrets, key: brain-raft-secret, optional: false }
            # Trusted-hop secret for the /v1 control plane: when set, the brain
            # requires it on /v1 (node sidecar heartbeats, LB/admin reads, and the
            # brain's own follower→leader forwarding all attach it). Same Secret
            # key as the node/LB data-plane secret. It is required in production.
            - name: FIDUCIA_INTERNAL_SECRET
              valueFrom:
                secretKeyRef: { name: fiducia-secrets, key: internal-secret, optional: false }
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://fiducia-otel-agent.fiducia.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAMESPACE
              value: "fiducia-cloud"
            - name: FIDUCIA_DEPLOYMENT_ENV
              value: "prod"
            - name: FIDUCIA_LOG_FORMAT
              value: "json"
          # cluster id, shard count, replication factor, target nodes, and the
          # cross-cluster brain peers all come from topology.env (see topology.toml).
          # RF + failure-domain spreading (by cluster) is what delivers the
          # "survive losing 1 cluster" guarantee for data shards.
          envFrom:
            - configMapRef: { name: fiducia-cluster }
          # Gate liveness until the brain member has restored its replicated log
          # from the PVC and can serve /healthz (see the node's startupProbe note).
          startupProbe:   { httpGet: { path: /healthz, port: 8095 }, periodSeconds: 2, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /readyz, port: 8095 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8095 }, periodSeconds: 15 }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/fiducia-brain }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 2Gi
        # storageClassName set per-cluster by the overlay.
