# NetworkPolicy — L3/L4 belt-and-suspenders for the node, BEHIND the L7
# trusted-hop secret (FIDUCIA_INTERNAL_SECRET).
#
# Goal: the node's client/data plane (:8090, which serves /healthz + /v1) must not
# be reachable from outside this namespace — only the in-namespace load balancer
# should call it. Selecting the node pod with an Ingress policy implicitly denies
# any ingress not matched below.
#
# The node serves the two planes on SEPARATE ports (see fiducia-node main.rs):
#   :8090 — client/data plane: /healthz, /readyz, /v1/*  (LB only, in-namespace)
#   :9090 — peer plane: node↔node Raft RPC /raft/*        (cross-cluster)
# so the planes are cleanly separable at L4. The L7 trusted-hop secret
# (FIDUCIA_INTERNAL_SECRET) still authenticates both planes; this policy narrows
# the network blast radius behind it.
#
# Cross-cluster Raft: topology.toml addresses peers at :9090
# (node_peer_endpoint = node.<cluster>.fiducia.cloud:9090), reachable from the
# OTHER clusters — i.e. from outside this namespace. Rule (2) keeps :9090 open
# from any source so inter-region consensus is never severed; it is guarded at L7
# by the secret and at L3 by the mesh (connectivity = clustermesh / WireGuard /
# mTLS). The client plane (:8090) is NOT opened to outside sources — that is the
# whole point.
#
# Kubelet liveness/readiness probes (to :8090) are exempted by the CNI's
# health-check failsafe — true for Cilium (this topology's declared CNI) and
# Calico. On a CNI that subjects kubelet traffic to NetworkPolicy, add an ipBlock
# allow for the node/pod CIDRs in each cluster overlay.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fiducia-node-ingress
  namespace: fiducia
spec:
  podSelector:
    matchLabels:
      app: fiducia-node
  policyTypes: [Ingress]
  ingress:
    # (1) Any pod in the fiducia namespace → all node ports. Covers the load
    #     balancer (:8090 /v1), the brain scraping the sidecar (:8091), and
    #     intra-cluster peer RPC. namespaceSelector matches the auto-applied
    #     kubernetes.io/metadata.name label (Kubernetes >= 1.21).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fiducia
    # (2) Cross-cluster Raft peer transport: the declared peer port, from any
    #     source (peers arrive from outside this namespace). Authenticated at L7
    #     by FIDUCIA_INTERNAL_SECRET; the network layer is the mesh/VPN/mTLS.
    - ports:
        - { protocol: TCP, port: 9090 }
---
# Egress counterpart to rule (2): under the namespace default-deny
# (base/networkpolicy.yaml) the node must be allowed to DIAL its peers, or
# cross-cluster Raft (FIDUCIA_PEERS = node.<cluster>.fiducia.cloud:9090) is
# severed. Peers resolve to routable addresses OUTSIDE this namespace (the mesh /
# VPN / mTLS transport), so the destination is unrestricted and scoped to the
# declared peer port only. Intra-namespace and DNS egress are covered by the base
# allow-namespace-internal / allow-dns-egress policies.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fiducia-node-peer-egress
  namespace: fiducia
spec:
  podSelector:
    matchLabels:
      app: fiducia-node
  policyTypes: [Egress]
  egress:
    - ports:
        - { protocol: TCP, port: 9090 }
