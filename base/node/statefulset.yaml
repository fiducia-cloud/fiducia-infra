# fiducia-node: the data plane. StatefulSet because each node is a Raft member —
# it needs a stable identity and durable storage for its shard logs/snapshots.
# The fiducia-node-sidecar runs as a second container in the same pod and is this
# node's bridge to the control plane (heartbeat + failure-domain metadata) and to
# the observability stack.
#
# Cluster-specific values (FIDUCIA_CLUSTER, FIDUCIA_PEERS, FIDUCIA_BRAIN_PEERS,
# storageClassName, replicas) are injected by each overlay under clusters/.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fiducia-node
  namespace: fiducia
spec:
  serviceName: fiducia-node          # headless service for stable per-pod DNS
  replicas: 3                         # per cluster (overlay may change)
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: fiducia-node
  template:
    metadata:
      labels:
        app: fiducia-node
    spec:
      # Spread node pods across zones WITHIN a cluster. Cross-CLUSTER spread of a
      # shard's replicas is enforced by the brain (failure domain = cluster), not
      # by k8s scheduling.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: fiducia-node
      # Hardened baseline for both containers: unprivileged, no added Linux
      # capabilities, no privilege escalation, read-only rootfs (+ writable /tmp).
      # Raft state lives only on the per-pod PVC, made writable via fsGroup.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: node
          image: ghcr.io/fiducia-cloud/fiducia-node:latest   # TODO: build + push images (see README)
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - { containerPort: 8090, name: http }
            - { containerPort: 9090, name: peer }   # cross-cluster Raft transport
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            # Globally-unique node id: <pod>.<cluster> (FIDUCIA_CLUSTER from the
            # cluster ConfigMap below).
            - name: FIDUCIA_NODE_ID
              value: "$(POD_NAME).$(FIDUCIA_CLUSTER)"
            - name: PORT
              value: "8090"
          envFrom:
            - configMapRef: { name: fiducia-cluster }   # FIDUCIA_CLUSTER, FIDUCIA_SHARD_COUNT, FIDUCIA_PEERS
          readinessProbe: { httpGet: { path: /readyz, port: 8090 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8090 }, periodSeconds: 15 }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/fiducia }
            - { name: tmp, mountPath: /tmp }

        # --- sidecar: control-plane heartbeat/metadata + logs/metrics ---
        - name: sidecar
          image: ghcr.io/fiducia-cloud/fiducia-node-sidecar:latest   # TODO: build + push
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - { containerPort: 8091, name: sidecar }
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: FIDUCIA_NODE_ID
              value: "$(POD_NAME).$(FIDUCIA_CLUSTER)"
            - name: FIDUCIA_NODE_URL
              value: "http://localhost:8090"
            - name: FIDUCIA_NODE_ADDRESS
              value: "http://$(POD_IP):8090"
            # Talk to the LOCAL brain member; brain members form one Raft group
            # across clusters and forward to the brain leader.
            - name: FIDUCIA_BRAIN_URL
              value: "http://fiducia-brain.fiducia.svc.cluster.local:8095"
            # THE key field for "2 of 3 clusters": the brain treats this as the
            # top-level failure domain and places each shard's replicas across
            # distinct values (= clusters).
            - name: FIDUCIA_REGION
              valueFrom: { configMapKeyRef: { name: fiducia-cluster, key: FIDUCIA_CLUSTER } }
          readinessProbe: { httpGet: { path: /healthz, port: 8091 }, periodSeconds: 10 }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
        # storageClassName is set per-cluster by the overlay (gcp/aws/hetzner).
