# fiducia-node: the data plane. StatefulSet because each node is a Raft member —
# it needs a stable identity and durable storage for its shard logs/snapshots.
# The fiducia-node-sidecar runs as a second container in the same pod and is this
# node's bridge to the control plane (heartbeat + failure-domain metadata) and to
# the observability stack.
#
# Cluster-specific values (FIDUCIA_CLUSTER, FIDUCIA_PEERS, FIDUCIA_BRAIN_PEERS,
# storageClassName, replicas) are injected by each overlay under clusters/.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fiducia-node
  namespace: fiducia
spec:
  serviceName: fiducia-node          # headless service for stable per-pod DNS
  replicas: 3                         # per cluster (overlay may change)
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app: fiducia-node
  template:
    metadata:
      labels:
        app: fiducia-node
    spec:
      # Neither the node nor its sidecar calls the Kubernetes API, so don't mount a
      # ServiceAccount token — one less credential on the cross-cluster-reachable
      # node pod (CIS 5.1.6; defense-in-depth behind the egress NetworkPolicy).
      automountServiceAccountToken: false
      # ── One node pod per machine (required) ──────────────────────────────────
      # Each node pod is a Raft member holding shard replicas; two of them on the
      # same VM would make that VM a correlated failure domain (lose it, lose two
      # of a shard's local replicas) and would waste the "5 machines" spread. So a
      # REQUIRED host anti-affinity pins at most one fiducia-node per machine —
      # node_replicas=5 therefore lands on 5 distinct machines. The single brain
      # member per cluster is NOT in this set, so it may share a machine with a
      # node (the deliberate "brain co-located with a node" case). To deliberately
      # pack >1 node per machine, relax this to preferredDuringScheduling.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: fiducia-node
      # Then spread those per-machine pods across zones WITHIN a cluster (best
      # effort). Cross-CLUSTER spread of a shard's replicas is enforced by the
      # brain (failure domain = cluster), not by k8s scheduling.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: fiducia-node
      # Hardened baseline for both containers: unprivileged, no added Linux
      # capabilities, no privilege escalation, read-only rootfs (+ writable /tmp).
      # Raft state lives only on the per-pod PVC, made writable via fsGroup.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: node
          image: ghcr.io/fiducia-cloud/fiducia-node:v0.1.0   # tag pin — prod must pin by digest (base/README.md "Image pinning")
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - { containerPort: 8090, name: http }
            - { containerPort: 9090, name: peer }   # cross-cluster Raft transport
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            # Globally-unique node id: <pod>.<cluster>. FIDUCIA_CLUSTER must be an
            # EXPLICIT env entry here (not only envFrom): k8s $(VAR) interpolation
            # can only reference earlier `env` entries — envFrom vars are invisible
            # to it. Without this, FIDUCIA_NODE_ID stays the LITERAL string
            # "…$(FIDUCIA_CLUSTER)" and every cluster's pod-N claims the SAME
            # identity — a cross-cluster Raft/membership collision.
            - name: FIDUCIA_CLUSTER
              valueFrom: { configMapKeyRef: { name: fiducia-cluster, key: FIDUCIA_CLUSTER } }
            - name: FIDUCIA_NODE_ID
              value: "$(POD_NAME).$(FIDUCIA_CLUSTER)"
            - name: PORT
              value: "8090"                # client/data plane: /healthz, /readyz, /v1/*
            # Peer plane: node↔node Raft RPC (/raft/*). Peers address each other at
            # this port (FIDUCIA_PEERS / topology node_peer_endpoint = host:9090) and
            # the NetworkPolicy leaves it reachable cross-cluster while locking :8090
            # to in-namespace. Matches the `peer` containerPort + Service port.
            - name: FIDUCIA_PEER_PORT
              value: "9090"
            # Durable Raft state (term/vote/log) lives here — MUST be the PVC mount
            # below, never ephemeral storage, or a pod restart drops this member's
            # log. Read by fiducia-node's RaftTiming/NodeConfig.
            - name: FIDUCIA_DATA_DIR
              value: "/var/lib/fiducia"
            # Trusted-hop secret: when present, the node requires it on /v1 (from
            # the LB) and /raft (from peer nodes), so a direct caller can't forge
            # the LB-injected x-fiducia-org-id. The Secret is required so a
            # production pod cannot start with the guard silently disabled.
            # Provision out-of-band:
            #   kubectl -n fiducia create secret generic fiducia-secrets \
            #     --from-literal=internal-secret=$(openssl rand -hex 32)
            - name: FIDUCIA_INTERNAL_SECRET
              valueFrom:
                secretKeyRef: { name: fiducia-secrets, key: internal-secret, optional: false }
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://fiducia-otel-agent.fiducia.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAMESPACE
              value: "fiducia-cloud"
            - name: FIDUCIA_DEPLOYMENT_ENV
              value: "prod"
            - name: FIDUCIA_LOG_FORMAT
              value: "json"
          envFrom:
            - configMapRef: { name: fiducia-cluster }   # FIDUCIA_CLUSTER, FIDUCIA_SHARD_COUNT, FIDUCIA_PEERS
            # Provider-neutral at-rest protection contract. Populate this dedicated
            # Secret through External Secrets, a CSI driver, Vault Agent, or another
            # out-of-band injector. Absence keeps legacy deployments compatible;
            # fiducia-node rejects partial local-keyring/Vault configuration.
            - secretRef:
                name: fiducia-kv-protection
                optional: true
          # startupProbe gates liveness/readiness until the member is up: a Raft node
          # can replay a large log/snapshot on boot and take a while to serve
          # /healthz; without this the 15s liveness (×3) could kill it into a restart
          # loop. Allows up to 60×2s = 120s to start.
          startupProbe:   { httpGet: { path: /healthz, port: 8090 }, periodSeconds: 2, failureThreshold: 60 }
          readinessProbe: { httpGet: { path: /readyz, port: 8090 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8090 }, periodSeconds: 15 }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/fiducia }
            - { name: tmp, mountPath: /tmp }

        # --- sidecar: control-plane heartbeat/metadata + logs/metrics ---
        - name: sidecar
          image: ghcr.io/fiducia-cloud/fiducia-node-sidecar:v0.1.0   # tag pin — prod must pin by digest (base/README.md "Image pinning")
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - { containerPort: 8091, name: sidecar }
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            # Explicit env so $(FIDUCIA_CLUSTER) expands — see the node container.
            - name: FIDUCIA_CLUSTER
              valueFrom: { configMapKeyRef: { name: fiducia-cluster, key: FIDUCIA_CLUSTER } }
            - name: FIDUCIA_NODE_ID
              value: "$(POD_NAME).$(FIDUCIA_CLUSTER)"
            - name: FIDUCIA_NODE_URL
              value: "http://localhost:8090"
            - name: FIDUCIA_NODE_ADDRESS
              value: "http://$(POD_IP):8090"
            - name: FIDUCIA_EXPORT_TARGET
              value: "node"
            - name: FIDUCIA_SIDECAR_ROLE
              value: "full"
            # Talk to the LOCAL brain member; brain members form one Raft group
            # across clusters and forward to the brain leader.
            - name: FIDUCIA_BRAIN_URL
              value: "http://fiducia-brain.fiducia.svc.cluster.local:8095"
            # THE key field for "2 of 3 clusters": the brain treats this as the
            # top-level failure domain and places each shard's replicas across
            # distinct values (= clusters).
            - name: FIDUCIA_REGION
              valueFrom: { configMapKeyRef: { name: fiducia-cluster, key: FIDUCIA_CLUSTER } }
            # Trusted-hop secret: the sidecar scrapes the local node's guarded
            # /v1/status and POSTs to the brain's guarded /v1; it must present this
            # on both. Same required Secret key as the node container.
            - name: FIDUCIA_INTERNAL_SECRET
              valueFrom:
                secretKeyRef: { name: fiducia-secrets, key: internal-secret, optional: false }
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://fiducia-otel-agent.fiducia.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAMESPACE
              value: "fiducia-cloud"
            - name: FIDUCIA_DEPLOYMENT_ENV
              value: "prod"
            - name: FIDUCIA_LOG_FORMAT
              value: "json"
          # /healthz on :8091 — the sidecar's default PORT (build_router in
          # fiducia-node-sidecar main.rs; the manifest sets no PORT so 8091 holds).
          # The startup gate keeps the 15s liveness from killing a sidecar still
          # wiring up its exporter/heartbeat on first boot: up to 30×2s = 60s.
          startupProbe:   { httpGet: { path: /healthz, port: 8091 }, periodSeconds: 2, failureThreshold: 30 }
          readinessProbe: { httpGet: { path: /healthz, port: 8091 }, periodSeconds: 10 }
          # The sidecar owns the node's heartbeat to the brain. If it deadlocks,
          # readiness alone won't restart it and the brain will mark an otherwise-
          # healthy node dead (needless shard failover). Restart a hung sidecar.
          livenessProbe:  { httpGet: { path: /healthz, port: 8091 }, periodSeconds: 15 }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
          volumeMounts:
            - { name: tmp-sidecar, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tmp-sidecar
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
        # storageClassName is set per-cluster by the overlay (hetzner/vultr/civo).
