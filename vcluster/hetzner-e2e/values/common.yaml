# Official vCluster chart 0.35.1 values for the zero-new-server Hetzner proof
# fleet. Install with the guarded script so each tenant is pinned to a distinct
# host node. No host NodePort, LoadBalancer, ingress, or public endpoint exists.

controlPlane:
  distro:
    k8s:
      enabled: true
      image:
        registry: ghcr.io
        repository: loft-sh/kubernetes
        tag: v1.36.0@sha256:003a79a8b919489b1cd2adbc091aac8de489b60732747c5f2b919b4b5166b246
      apiServer:
        extraArgs:
          - --max-requests-inflight=200
          - --max-mutating-requests-inflight=100
  coredns:
    deployment:
      image: registry.k8s.io/coredns/coredns:v1.14.2@sha256:e7e6440cfd1e919280958f5b5a6ab2b184d385bba774c12ad2a9e1e4183f90d9
      replicas: 1
      resources:
        requests: { cpu: 20m, memory: 64Mi }
        limits: { cpu: 250m, memory: 192Mi }
  service:
    spec:
      type: ClusterIP
  statefulSet:
    image:
      registry: ghcr.io
      repository: loft-sh/vcluster-oss
      tag: 0.35.1@sha256:35faf06fbfce4a3802ca7e459998dc191aad06a3544bde1a46118a4edcdaef62
    imagePullPolicy: IfNotPresent
    resources:
      requests: { cpu: 200m, memory: 256Mi, ephemeral-storage: 1Gi }
      limits: { cpu: "1", memory: 2Gi, ephemeral-storage: 4Gi }
    pods:
      labels:
        fiducia.cloud/vcluster-fleet: hetzner-e2e
    persistence:
      volumeClaim:
        enabled: true
        retentionPolicy: Delete
        size: 5Gi
        # Never inherit the host default. On the current Hetzner cluster that
        # default is CSI-backed gp3 and provisions a paid 10 GiB cloud Volume.
        storageClass: local-path
        accessModes: [ReadWriteOnce]
    scheduling:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  fiducia.cloud/vcluster-fleet: hetzner-e2e
              namespaceSelector:
                matchLabels:
                  fiducia.cloud/vcluster-fleet: hetzner-e2e
              topologyKey: kubernetes.io/hostname

sync:
  toHost:
    pods:
      enabled: true
      useSecretsForSATokens: true
      enforceTolerations:
        - node-role.kubernetes.io/control-plane:NoSchedule
      rewriteHosts:
        enabled: true
        initContainer:
          image:
            registry: mirror.gcr.io
            repository: library/alpine
            tag: 3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
    services: { enabled: true }
    endpoints: { enabled: true }
    endpointSlices: { enabled: true }
    persistentVolumeClaims: { enabled: true }
    networkPolicies: { enabled: true }
    podDisruptionBudgets: { enabled: true }
  fromHost:
    nodes:
      enabled: true
      syncBackChanges: false
      clearImageStatus: true
      selector:
        all: false
        labels: {}
    storageClasses: { enabled: true }

policies:
  podSecurityStandard: restricted
  resourceQuota:
    enabled: true
    labels: { fiducia.cloud/vcluster-fleet: hetzner-e2e }
    quota:
      requests.cpu: "3"
      requests.memory: 6Gi
      requests.storage: 30Gi
      requests.ephemeral-storage: 12Gi
      limits.cpu: "8"
      limits.memory: 12Gi
      limits.ephemeral-storage: 32Gi
      services.nodeports: "0"
      services.loadbalancers: "0"
      count/pods: "24"
      count/services: "24"
      count/secrets: "100"
      count/configmaps: "100"
      count/persistentvolumeclaims: "8"
  limitRange:
    enabled: true
    labels: { fiducia.cloud/vcluster-fleet: hetzner-e2e }
    default: { cpu: "1", memory: 1Gi, ephemeral-storage: 2Gi }
    defaultRequest: { cpu: 100m, memory: 128Mi, ephemeral-storage: 256Mi }
    max: { cpu: "2", memory: 2Gi, ephemeral-storage: 8Gi }
    min: { cpu: 10m, memory: 32Mi }
  networkPolicy:
    enabled: true
    labels: { fiducia.cloud/vcluster-fleet: hetzner-e2e }
    annotations:
      fiducia.cloud/purpose: locks-leases-proof
    workload:
      publicEgress: { enabled: false }
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  fiducia.cloud/vcluster-fleet: hetzner-e2e
          ports:
            - { protocol: TCP, port: 8088 }
            - { protocol: TCP, port: 8090 }
            - { protocol: TCP, port: 9090 }
            - { protocol: TCP, port: 9095 }
      egress:
        - to:
            - namespaceSelector:
                matchLabels:
                  fiducia.cloud/vcluster-fleet: hetzner-e2e
          ports:
            - { protocol: TCP, port: 8088 }
            - { protocol: TCP, port: 8090 }
            - { protocol: TCP, port: 9090 }
            - { protocol: TCP, port: 9095 }

# Cross-namespace service replication is read-only for remote services, but it
# needs cluster-scoped list/watch. The tenant cannot mutate host Nodes.
rbac:
  clusterRole:
    enabled: true

telemetry:
  enabled: false
