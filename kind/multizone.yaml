# kind cluster that SIMULATES the multi-cloud topology on one local cluster.
#
# Four worker nodes, each labeled with a distinct failure domain
# (topology.kubernetes.io/zone = hetzner/vultr/civo/digitalocean). fiducia-node's existing
# topologySpreadConstraints then place one replica per zone — the same
# "one replica per cluster" invariant the real fleet gets from topology.toml,
# reproduced locally with zero cloud spend.
#
# "Killing a cluster" in a chaos test = cordon+drain the node for that zone; the
# remaining 3/4 keep quorum. See ../kind/README.md and tools/kind-up.sh.
#
# A control-plane extraPortMapping exposes fiducia's HTTP API on localhost:8090
# via a fixed NodePort (30090) so fiducia-e2e can hit FIDUCIA_E2E_BASE_URL.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: fiducia
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30090
        hostPort: 8090
        protocol: TCP
  - role: worker
    labels:
      topology.kubernetes.io/zone: gcp
  - role: worker
    labels:
      topology.kubernetes.io/zone: aws
  - role: worker
    labels:
      topology.kubernetes.io/zone: hetzner
  - role: worker
    labels:
      topology.kubernetes.io/zone: azure
