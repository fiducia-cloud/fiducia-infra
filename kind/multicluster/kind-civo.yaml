# Kind config for the emulated "civo" cloud (Tier 2 local multi-cluster).
# See kind-hetzner.yaml for the shared design + CIDR table.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  podSubnet: "10.30.0.0/16"
  serviceSubnet: "10.31.0.0/16"
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8092
        listenAddress: "127.0.0.1"
        protocol: TCP
