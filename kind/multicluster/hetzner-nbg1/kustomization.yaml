# Hetzner-only emulator overlay for the Nuremberg (NBG1) member. The peer
# values in topology.env are templates; up.sh renders the live Kind addresses.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fiducia
resources:
  - ../common
configMapGenerator:
  - name: fiducia-cluster
    envs:
      - topology.env
generatorOptions:
  disableNameSuffixHash: true
