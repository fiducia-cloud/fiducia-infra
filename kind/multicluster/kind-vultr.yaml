# Kind config for the emulated "vultr" cloud (Tier 2 local multi-cluster).
# See kind-hetzner.yaml for the shared design + CIDR table.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  podSubnet: "10.20.0.0/16"
  serviceSubnet: "10.21.0.0/16"
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8091
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 30088
        hostPort: 8094
        listenAddress: "127.0.0.1"
        protocol: TCP
