# Kind config for the disposable Hetzner NBG1-labelled test member.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  podSubnet: "10.42.0.0/16"
  serviceSubnet: "10.43.0.0/16"
nodes:
  - role: control-plane
    extraPortMappings:
      - { containerPort: 30080, hostPort: 8101, listenAddress: "127.0.0.1", protocol: TCP }
      - { containerPort: 30088, hostPort: 8104, listenAddress: "127.0.0.1", protocol: TCP }
