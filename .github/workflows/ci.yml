# CI that validates the infra without touching real clusters: renderer self-tests,
# a topology staleness check, a kustomize build of every overlay, and terraform
# fmt/validate. The kind e2e job is workflow_dispatch-gated (needs a built image).
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  topology:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Validate GitHub Actions
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: ./.github/workflows/ci.yml ./.github/workflows/cli-flags.yml
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22.22.1"
      # renderer self-tests
      - run: node --test tools/*.test.mjs
      # fail if the generated per-cluster inputs are stale vs topology.toml
      - run: node tools/render.mjs --check
      - run: node tools/render-vcluster-hetzner-e2e.mjs --check
      - run: node tools/render-hetzner-e2e.mjs --check
      # every overlay must still build — production, local kind, and the default
      # zero-new-server vCluster proof tier.
      - run: |
          for c in clusters/*/ kind/overlay vcluster/hetzner-e2e/clusters/*/ k3s/hetzner-e2e/clusters/*/; do
            echo "== $c =="
            kubectl kustomize "$c" >/dev/null
          done
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.18.6
      - name: Render pinned vCluster chart profiles
        run: |
          set -e
          chart="$RUNNER_TEMP/vcluster-0.35.1.tgz"
          curl --proto '=https' --tlsv1.2 --fail --show-error --silent --location \
            https://charts.loft.sh/charts/vcluster-0.35.1.tgz --output "$chart"
          test "$(openssl dgst -sha256 "$chart" | awk '{print $NF}')" = \
            ec1db9e9faf2da674eba5df3594b9d209861ee8e5889be850a9bb60861158c5b
          for c in hetzner-fsn1 hetzner-nbg1 hetzner-hel1; do
            short=${c#hetzner-}
            out="/tmp/$c-vcluster.yaml"
            helm template "fiducia-$c" "$chart" \
              --namespace "fiducia-vc-$short" \
              --values vcluster/hetzner-e2e/values/common.yaml \
              --values "vcluster/hetzner-e2e/values/$c.yaml" \
              --set-string 'sync.fromHost.nodes.selector.labels.kubernetes\.io/hostname=dummy-node' \
              --set-string 'controlPlane.statefulSet.scheduling.nodeSelector.kubernetes\.io/hostname=dummy-node' \
              --include-crds | tee "$out" | openssl dgst -sha256
            if grep -nE '^[[:space:]]*type:[[:space:]]*(NodePort|LoadBalancer)[[:space:]]*$' "$out"; then
              echo "forbidden host-exposed Service in $out" >&2
              exit 1
            fi
            grep -q 'ghcr.io/loft-sh/vcluster-oss:0.35.1@sha256:' "$out"
            node tools/validate-vcluster-manifest.mjs "$out" "fiducia-$c"
          done
      - name: Validate operator scripts
        run: bash -n scripts/hetzner-e2e-*.sh
      # Dependency advisories are a required supply-chain gate.
      - run: npm audit

  # Tier 2 provisioning IaC is never APPLIED in CI (that spends real money) — it is
  # only format-checked and validated. `terraform validate` needs `terraform init`
  # to fetch provider schemas, which is why this runs with network (GH-hosted).
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.9.8"
      - name: fmt
        run: terraform -chdir=terraform fmt -recursive -check -diff
      - name: validate modules + Terraform environments
        run: |
          set -e
          for d in terraform/modules/*/ terraform/envs/e2e terraform/envs/hetzner-e2e; do
            echo "== validate $d =="
            terraform -chdir="$d" init -backend=false -input=false >/dev/null
            terraform -chdir="$d" validate
          done

  # Local kind tier (Tier 1). Operator-run: it needs a built fiducia-node image, so
  # it is workflow_dispatch-gated, not on every push. Documents the standing-up
  # path the fiducia-e2e suite consumes; see docs/e2e.md.
  kind-e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # No `environment:` gate — the repo defines no deployment environments, so a
    # reference here would be ungated scaffolding. Add `environment: e2e` once a
    # protected environment of that name exists in repo settings.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          config: kind/multizone.yaml
          cluster_name: fiducia
      # A real run then builds+loads the fiducia-node image and applies kind/overlay
      # (FIDUCIA_LOAD_IMAGES=1 tools/kind-up.sh), then checks out fiducia-e2e and runs
      # `npm test` with FIDUCIA_E2E_BASE_URL=http://localhost:8090.
      - name: overlay builds
        run: kubectl kustomize kind/overlay >/dev/null
