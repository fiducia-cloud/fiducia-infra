# Audits .cli-flags.toml against the flags-2-env submodule so documented CLI flags
# stay in sync. Triggers only when the flag config or its tooling changes.
name: CLI flags

on:
  pull_request:
    paths:
      - ".github/workflows/cli-flags.yml"
      - ".cli-flags.toml"
      - ".gitmodules"
      - "vendor/flags-2-env"
      - "scripts/with-flags2env.sh"
  push:
    branches: [main]
    paths:
      - ".github/workflows/cli-flags.yml"
      - ".cli-flags.toml"
      - ".gitmodules"
      - "vendor/flags-2-env"
      - "scripts/with-flags2env.sh"

permissions:
  contents: read

jobs:
  audit:
    # Builds and runs submodule code — never for PRs from forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - run: make -B -C vendor/flags-2-env all
      - run: vendor/flags-2-env/build/flags2env audit .cli-flags.toml
