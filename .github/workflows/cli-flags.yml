# Audits .cli-flags.toml against the flags-2-env submodule so documented CLI flags
# stay in sync. Triggers only when the flag config or its tooling changes.
name: CLI flags

on:
  pull_request:
    paths:
      - ".cli-flags.toml"
      - ".gitmodules"
      - "vendor/flags-2-env"
      - "scripts/with-flags2env.sh"
  push:
    branches: [main]
    paths:
      - ".cli-flags.toml"
      - ".gitmodules"
      - "vendor/flags-2-env"
      - "scripts/with-flags2env.sh"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - run: make -B -C vendor/flags-2-env all
      - run: vendor/flags-2-env/build/flags2env audit .cli-flags.toml
