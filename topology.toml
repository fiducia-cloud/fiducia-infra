# ─────────────────────────────────────────────────────────────────────────────
# fiducia multi-cluster topology — THE single declarative source of truth.
#
# Edit this file, then run `node tools/render.mjs` (or `npm run render`). It fans
# these values out into every cluster's kustomize inputs (peer lists, storage
# class, replicas) and the edge's region list, so all three clusters discover
# each other from one place. CI (`npm run check`) fails if anything is stale.
#
# This declares MEMBERSHIP (peers + endpoints) only — NOT leadership. Which node
# leads each shard, and which brain member leads, is ELECTED by Raft at runtime
# and moves on failure; never hardcode a "master". See README ("Leadership is
# elected, not declared").
#
# Quorum rule: with replication_factor = 3 and one replica per cluster, you need
# at least 3 clusters; losing any one keeps a 2/3 majority. See README.
# ─────────────────────────────────────────────────────────────────────────────

cluster_id = "fiducia-prod"
shard_count = 256
replication_factor = 3

# How the clusters are wired together at L3/L7. One of:
#   clustermesh   — Cilium Cluster Mesh (recommended; see tools/clustermesh.sh)
#   wireguard     — VPN / VPC peering between clusters
#   public-mtls   — public per-cluster endpoints with mTLS
connectivity = "clustermesh"

# Raft timing, sized for a CROSS-CLOUD group. The node's built-in defaults are
# LAN values (heartbeat 50ms, election 150–300ms) — below a single transatlantic
# round trip, so on this gcp(us)+aws(us)+hetzner(eu) topology they would cause
# continuous spurious elections and leadership flapping. These render into the
# fiducia-cluster ConfigMap as FIDUCIA_RAFT_* and are read by RaftTiming::from_env.
# Rule of thumb: heartbeat >= inter-cloud RTT; election_min >= ~10x RTT; a wide
# jitter spreads campaigns to avoid split votes. US<->EU RTT is ~90–100ms.
[raft]
tick_ms = 50
heartbeat_ms = 150
election_min_ms = 1000
election_jitter_ms = 1000

# One [[cluster]] block per Kubernetes cluster. The *_endpoint values are how the
# OTHER clusters reach this one — replace the placeholders with real DNS/IPs
# (LoadBalancer addresses, mesh global-service names, or VPN addresses).

[[cluster]]
name = "gcp"
platform = "gcp"
region = "us-central1"
storage_class = "standard-rwo"
node_replicas = 3
brain_endpoint = "brain.gcp.fiducia.cloud:9095"
node_peer_endpoint = "node.gcp.fiducia.cloud:9090"
lb_endpoint = "https://gcp.lb.fiducia.cloud"

[[cluster]]
name = "aws"
platform = "aws"
region = "us-east-1"
storage_class = "gp3"
node_replicas = 3
brain_endpoint = "brain.aws.fiducia.cloud:9095"
node_peer_endpoint = "node.aws.fiducia.cloud:9090"
lb_endpoint = "https://aws.lb.fiducia.cloud"

[[cluster]]
name = "hetzner"
platform = "hetzner"
region = "eu-central"
storage_class = "hcloud-volumes"
node_replicas = 3
brain_endpoint = "brain.hetzner.fiducia.cloud:9095"
node_peer_endpoint = "node.hetzner.fiducia.cloud:9090"
lb_endpoint = "https://hetzner.lb.fiducia.cloud"

# A 4th platform. With RF=3 each shard's replicas still spread one-per-cluster
# across THREE distinct failure domains; a 4th cluster adds a spare domain (the
# brain may place a shard's 3 replicas on any 3 of the 4 platforms) plus extra
# capacity — it does NOT change the "survive losing 1 cluster" guarantee.
#
# brain = false → azure is a NODE-ONLY cluster. The brain Raft group MUST stay an
# odd size for clean quorum math; the design pins it at 3 (gcp/aws/hetzner). If
# azure also ran a brain the group would be 4 (even) — same fault tolerance as 3
# but worse quorum math. So azure runs data-plane nodes only; its sidecars still
# reach all three brains. render.mjs enforces an odd, ≥ replication_factor brain
# group and deletes the brain workload from node-only overlays.
[[cluster]]
name = "azure"
platform = "azure"
region = "eastus"
storage_class = "managed-csi"
node_replicas = 3
brain = false
brain_endpoint = "brain.azure.fiducia.cloud:9095"
node_peer_endpoint = "node.azure.fiducia.cloud:9090"
lb_endpoint = "https://azure.lb.fiducia.cloud"
