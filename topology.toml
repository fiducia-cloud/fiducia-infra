# ─────────────────────────────────────────────────────────────────────────────
# fiducia multi-cluster topology — THE single declarative source of truth.
#
# Edit this file, then run `node tools/render.mjs` (or `npm run render`). It fans
# these values out into every cluster's kustomize inputs (peer lists, storage
# class, replicas) and the edge's region list, so all three clusters discover
# each other from one place. CI (`npm run check`) fails if anything is stale.
#
# This declares MEMBERSHIP (peers + endpoints) only — NOT leadership. Which node
# leads each shard, and which brain member leads, is ELECTED by Raft at runtime
# and moves on failure; never hardcode a "master". See README ("Leadership is
# elected, not declared").
#
# Quorum rule: with replication_factor = 3 and one replica per cluster you need
# at least 3 clusters; losing any one keeps a 2/3 majority. See README.
#
# ── Provider is a swap, not a rewrite ────────────────────────────────────────
# A cluster's cloud is JUST the `platform` field here + a matching terraform
# module (terraform/modules/<platform>). To move a cluster from Vultr to, say,
# DigitalOcean: (1) change `platform = "digitalocean"`, (2) point that cluster's
# terraform stanza at terraform/modules/digitalocean (same module interface —
# see terraform/README.md), (3) re-provision, (4) update this cluster's
# *_endpoint / kubectl context, (5) `node tools/render.mjs`. Nothing in base/ or
# the app code changes — the platform only decides where the VMs live and the
# storage_class name. Drop-in module targets: hetzner, vultr, civo,
# digitalocean, scaleway, akamai (LKE), plus the hyperscalers (gke/eks/aks).
# ─────────────────────────────────────────────────────────────────────────────

cluster_id = "fiducia-prod"
shard_count = 256
replication_factor = 3

# How the clusters are wired together at L3/L7. One of:
#   clustermesh   — Cilium Cluster Mesh (recommended; see tools/clustermesh.sh).
#                   Pod-to-pod routable across clouds → lowest-latency Raft.
#   wireguard     — encrypted VPN mesh between clusters (see docs) when the
#                   clouds can't peer natively.
#   public-mtls   — public per-cluster endpoints with mTLS (highest latency).
connectivity = "clustermesh"

# Raft timing, sized for a CROSS-CLOUD group. The node's built-in defaults are
# LAN values (heartbeat 50ms, election 150–300ms) — below a single inter-cloud
# round trip, so on an EU-spread hetzner+vultr+civo topology they would cause
# continuous spurious elections and leadership flapping. These render into the
# fiducia-cluster ConfigMap as FIDUCIA_RAFT_* and are read by RaftTiming::from_env.
# Rule of thumb: heartbeat >= inter-cloud RTT; election_min >= ~10x RTT; a wide
# jitter spreads campaigns to avoid split votes. Keeping the three clusters in
# nearby EU regions (see below) holds inter-cloud RTT to ~10–30ms; these values
# leave generous headroom. If you spread across continents, raise them (US<->EU
# RTT is ~90–100ms → heartbeat 150, election_min 1000).
[raft]
tick_ms = 50
heartbeat_ms = 100
election_min_ms = 600
election_jitter_ms = 600

# One [[cluster]] block per Kubernetes cluster. The *_endpoint values are how the
# OTHER clusters reach this one — with clustermesh they become mesh global-service
# DNS (e.g. fiducia-node.fiducia.svc.clusterset.local:9090); otherwise real
# DNS/IPs (LoadBalancer addresses or VPN addresses).
#
# node_replicas = 5 with one pod per machine (enforced by a required host
# anti-affinity in base/node) ⇒ each cluster needs >= 5 worker machines. The
# single brain member per cluster MAY share a machine with a node (it has no
# node anti-affinity), so 5 machines/cluster is the floor, not 6.

[[cluster]]
name = "hetzner"
platform = "hetzner"
region = "eu-central"                 # Nuremberg / Falkenstein
storage_class = "hcloud-volumes"
node_replicas = 5
brain_endpoint = "brain.hetzner.fiducia.cloud:9095"
node_peer_endpoint = "node.hetzner.fiducia.cloud:9090"
lb_endpoint = "https://hetzner.lb.fiducia.cloud"

[[cluster]]
name = "vultr"
platform = "vultr"
region = "fra"                        # Frankfurt (near hetzner for low RTT)
storage_class = "vultr-block-storage-hdd"
node_replicas = 5
brain_endpoint = "brain.vultr.fiducia.cloud:9095"
node_peer_endpoint = "node.vultr.fiducia.cloud:9090"
lb_endpoint = "https://vultr.lb.fiducia.cloud"

[[cluster]]
name = "civo"
platform = "civo"
region = "lon1"                       # London (Civo's EU region)
storage_class = "civo-volume"
node_replicas = 5
brain_endpoint = "brain.civo.fiducia.cloud:9095"
node_peer_endpoint = "node.civo.fiducia.cloud:9090"
lb_endpoint = "https://civo.lb.fiducia.cloud"

# ── Scaling out (optional) ───────────────────────────────────────────────────
# A 4th cluster adds a spare failure domain + capacity WITHOUT changing the
# "survive losing 1 cluster" guarantee. Add it NODE-ONLY (`brain = false`): the
# brain Raft group must stay an ODD size for clean quorum math, and the design
# pins it at 3 (hetzner/vultr/civo). A node-only cluster's sidecars still reach
# all three brains. render.mjs enforces an odd, >= replication_factor brain group.
# Example (uncomment + provision to use):
#
# [[cluster]]
# name = "digitalocean"
# platform = "digitalocean"
# region = "fra1"
# storage_class = "do-block-storage"
# node_replicas = 5
# brain = false
# brain_endpoint = "brain.digitalocean.fiducia.cloud:9095"
# node_peer_endpoint = "node.digitalocean.fiducia.cloud:9090"
# lb_endpoint = "https://digitalocean.lb.fiducia.cloud"
